version: "3.9"

# Development overrides — hot reload, volume mounts, debug ports
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./backend
      target: development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
      - "5678:5678"   # debugpy

  frontend:
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000

  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_LOG_STATEMENT: "all"

  redis:
    ports:
      - "6379:6379"
    command: redis-server --loglevel verbose
