version: "3.9"

# Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level warning
    environment:
      DEBUG: "false"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    restart: always
    environment:
      POSTGRES_LOG_STATEMENT: "none"
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    deploy:
      resources:
        limits:
          memory: 256M

  n8n:
    restart: always
    environment:
      N8N_LOG_LEVEL: warn
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336  # 14 days
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: placement_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: always
