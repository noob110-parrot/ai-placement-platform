name: CI/CD — AI Placement Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Backend: Lint + Test ──────────────────────────────────────────────────

  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: placement_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check app/ --ignore E501

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/placement_test_db
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci-only
          OPENAI_API_KEY: sk-test
          WHATSAPP_API_TOKEN: test
          WHATSAPP_PHONE_NUMBER_ID: test
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          ENABLE_WHATSAPP_NOTIFICATIONS: "false"
          ENABLE_EMAIL_NOTIFICATIONS: "false"
          ENABLE_CALENDAR_SYNC: "false"
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend

  # ── Frontend: Lint + Build ────────────────────────────────────────────────

  frontend-ci:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: AI Placement Platform
        run: npm run build

  # ── Docker Build & Push ───────────────────────────────────────────────────

  docker-build:
    name: Docker — Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy to Staging ─────────────────────────────────────────────────────

  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.placement.university.edu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/ai-placement-platform
            git pull origin main
            docker compose pull
            docker compose up -d --no-build
            docker compose exec -T backend alembic upgrade head
            echo "✅ Staging deployment complete"

  # ── Security Scan ─────────────────────────────────────────────────────────

  security-scan:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2024-48 || true

      - name: Node.js dependency audit
        working-directory: ./frontend
        run: npm audit --audit-level=high || true
