name: Deploy — Production

on:
  workflow_run:
    workflows: ["CI/CD — AI Placement Platform"]
    types: [completed]
    branches: [main]

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: https://placement.university.edu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting production deployment..."
            cd /opt/ai-placement-platform

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Pull new Docker images
            docker compose pull backend frontend

            # Run migrations (zero-downtime)
            docker compose run --rm backend alembic upgrade head

            # Rolling restart
            docker compose up -d --no-build --remove-orphans

            # Health check
            sleep 10
            curl -f http://localhost:8000/health || (echo "❌ Health check failed" && exit 1)

            echo "✅ Production deployment complete at $(date)"

      - name: Notify Slack on success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "✅ AI Placement Platform deployed to production"
          SLACK_COLOR:   "good"

      - name: Notify Slack on failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ Production deployment failed"
          SLACK_COLOR:   "danger"
